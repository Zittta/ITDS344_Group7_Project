version: '3.8'

# Common Airflow configuration shared across all services
x-airflow-common: &airflow-common
  build: .
  environment: &airflow-common-env
    AIRFLOW__CORE__EXECUTOR: LocalExecutor
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres/${POSTGRES_DB}
    AIRFLOW__CORE__FERNET_KEY: ''
    AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: 'false'
    AIRFLOW__CORE__LOAD_EXAMPLES: 'false'
    AIRFLOW__API__AUTH_BACKENDS: 'airflow.api.auth.backend.basic_auth,airflow.api.auth.backend.session'
    AIRFLOW__SCHEDULER__ENABLE_HEALTH_CHECK: 'true'
    AIRFLOW__WEBSERVER__EXPOSE_CONFIG: 'true'
    # (requirements.txt installed in Dockerfile)
    # Project secrets (loaded from .env)
    SOCRATA_APP_TOKEN: ${SOCRATA_APP_TOKEN}
    MONGO_URI: ${MONGO_URI:-mongodb://mongo:27017}
  volumes:
    - ${AIRFLOW_PROJ_DIR:-.}/dags:/opt/airflow/dags
    - ${AIRFLOW_PROJ_DIR:-.}/logs:/opt/airflow/logs
    - ${AIRFLOW_PROJ_DIR:-.}/plugins:/opt/airflow/plugins
    - ${AIRFLOW_PROJ_DIR:-.}/data:/opt/airflow/data
  user: "${AIRFLOW_UID:-50000}:0"
  depends_on: &airflow-common-depends-on
    postgres:
      condition: service_healthy
    mongo:
      condition: service_healthy

services:
  # ─── MongoDB — Bronze / Silver / Gold storage ─────────────────────────────────────────────
  mongo:
    image: mongo:7.0
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 10s
      retries: 5
      start_period: 20s
    restart: always

  # ─── Mongo Express — Web UI for MongoDB ──────────────────────────────────────
  mongo-express:
    image: mongo-express:1.0.2
    ports:
      - "8081:8081"
    environment:
      ME_CONFIG_MONGODB_SERVER: mongo
      ME_CONFIG_MONGODB_PORT: 27017
      ME_CONFIG_BASICAUTH_USERNAME: admin
      ME_CONFIG_BASICAUTH_PASSWORD: admin
      ME_CONFIG_MONGODB_ENABLE_ADMIN: "true"
    depends_on:
      mongo:
        condition: service_healthy
    restart: always

  # ─── Metadata Database ────────────────────────────────────────────────────────
  postgres:
    image: postgres:13
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres-db-volume:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "${POSTGRES_USER}"]
      interval: 10s
      timeout: 10s
      retries: 5
    restart: always

  # ─── Airflow Web UI ───────────────────────────────────────────────────────────
  airflow-webserver:
    <<: *airflow-common
    command: webserver
    ports:
      - "${AIRFLOW_WEBSERVER_PORT}:8080"
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    restart: always
    depends_on:
      <<: *airflow-common-depends-on
      airflow-init:
        condition: service_completed_successfully
    user: "0:0"

  # ─── Airflow Scheduler ────────────────────────────────────────────────────────
  airflow-scheduler:
    <<: *airflow-common
    command: scheduler
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8974/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    restart: always
    depends_on:
      <<: *airflow-common-depends-on
      airflow-init:
        condition: service_completed_successfully
    user: "0:0"

  # ─── Database Init + User Creation (runs once) ────────────────────────────────
  airflow-init:
    <<: *airflow-common
    entrypoint: /bin/bash
    command:
      - -c
      - |
        # Create required directories
        mkdir -p /opt/airflow/dags \
                  /opt/airflow/data/raw_csv \
                  /opt/airflow/logs \
                  /opt/airflow/plugins

        # Fix ownership so scheduler/webserver (uid=50000) can write
        chown -R 50000:0 /opt/airflow/logs /opt/airflow/data /opt/airflow/dags
        chmod -R 777 /opt/airflow/logs /opt/airflow/data /opt/airflow/dags

        # Initialise Airflow metadata DB
        airflow db migrate

        # Create admin user (ignore error if user already exists)
        airflow users create \
          --username ${AIRFLOW_ADMIN_USERNAME} \
          --firstname Admin \
          --lastname User \
          --role Admin \
          --email ${AIRFLOW_ADMIN_EMAIL} \
          --password ${AIRFLOW_ADMIN_PASSWORD} || true
    environment:
      <<: *airflow-common-env
      _AIRFLOW_DB_MIGRATE: 'true'
      _AIRFLOW_WWW_USER_CREATE: 'true'
      _AIRFLOW_WWW_USER_USERNAME: ${AIRFLOW_ADMIN_USERNAME}
      _AIRFLOW_WWW_USER_PASSWORD: ${AIRFLOW_ADMIN_PASSWORD}
    user: "0:0"

  # ── Pipeline Auto-Trigger (runs once after scheduler is ready) ────────────────
  # Triggers all 3 pipelines in correct dependency order on first deploy.
  # Dependency order: population → crime (run 1) → 911 → crime (run 2)
  # After this, pipelines continue on their normal schedules automatically.
  airflow-init-trigger:
    <<: *airflow-common
    entrypoint: /bin/bash
    command:
      - -c
      - |
        echo "[trigger] Waiting for Airflow scheduler to be ready..."
        for i in $(seq 1 60); do
          if airflow dags list 2>/dev/null | grep -q "seattle_population_pipeline"; then
            echo "[trigger] Scheduler ready after attempt $i."
            break
          fi
          echo "[trigger] Attempt $i/60 — not ready yet, retrying in 5s..."
          sleep 5
        done

        # Step 1: Population → creates dim_demographics
        echo "[trigger] Step 1: seattle_population_pipeline"
        airflow dags trigger seattle_population_pipeline || true
        sleep 30

        # Step 2: Crime run 1 → creates dim_neighborhood + cross-dataset aggs
        echo "[trigger] Step 2: spd_crime_pipeline (run 1) — allow up to 5 min"
        airflow dags trigger spd_crime_pipeline || true
        sleep 300

        # Step 3: 911 → enriches fact_911_calls.neighborhood_name
        # (dim_neighborhood already built by run 1, so enrichment succeeds immediately)
        echo "[trigger] Step 3: seattle_911_pipeline"
        airflow dags trigger seattle_911_pipeline || true
        sleep 90

        # Step 4: Crime run 2 → agg_neighborhood_safety_profile with full 911 data
        echo "[trigger] Step 4: spd_crime_pipeline (run 2)"
        airflow dags trigger spd_crime_pipeline || true

        echo "[trigger] Done. Gold layer will be fully populated within ~5 minutes."
    depends_on:
      airflow-init:
        condition: service_completed_successfully
      airflow-scheduler:
        condition: service_healthy
    restart: "no"
    user: "0:0"

  # ─── Safety Dashboard — Analytics UI ──────────────────────────────────────────
  dashboard:
    <<: *airflow-common
    command: streamlit run dashboard/dashboard.py --server.port=8501 --server.address=0.0.0.0
    ports:
      - "8501:8501"
    depends_on:
      mongo:
        condition: service_healthy
      airflow-init-trigger:
        condition: service_completed_successfully
    volumes:
      - ${AIRFLOW_PROJ_DIR:-.}/dashboard:/opt/airflow/dashboard
    restart: always

  # ─── Zookeeper (Kafka dependency) ─────────────────────────────────────────────
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    restart: always

  # ─── Kafka Broker ─────────────────────────────────────────────────────────────
  kafka:
    image: confluentinc/cp-kafka:7.5.0
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_LOG_RETENTION_HOURS: 168
    healthcheck:
      test: ["CMD", "kafka-broker-api-versions", "--bootstrap-server", "localhost:9092"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 30s
    restart: always

  # ─── Kafka Producer (Socrata API → Kafka) ────────────────────────────────────
  kafka-producer:
    <<: *airflow-common
    command: python kafka/kafka_producer.py
    depends_on:
      kafka:
        condition: service_healthy
    volumes:
      - ${AIRFLOW_PROJ_DIR:-.}/kafka:/opt/airflow/kafka
      - ${AIRFLOW_PROJ_DIR:-.}/data:/opt/airflow/data
    environment:
      KAFKA_BOOTSTRAP: kafka:9092
      SOCRATA_APP_TOKEN: ${SOCRATA_APP_TOKEN}
    restart: always

  # ─── [STREAMING] Kafka Consumer — Kafka → MongoDB bronze ──────────────────────
  kafka-consumer-bronze:
    <<: *airflow-common
    command: python kafka/consumer_bronze.py
    depends_on:
      kafka:
        condition: service_healthy
      mongo:
        condition: service_healthy
    volumes:
      - ${AIRFLOW_PROJ_DIR:-.}/kafka:/opt/airflow/kafka
    environment:
      KAFKA_BOOTSTRAP: kafka:9092
      MONGO_URI: ${MONGO_URI:-mongodb://mongo:27017}
    restart: always

volumes:
  postgres-db-volume:
  mongo-data: